<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrative Control Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="project/styles.css">
</head>
<body>
  <header class="appbar">
    <div class="appbar-top">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div>
          <h1>Administrative Control Register</h1>
          <div class="sub">Payment Tracker &amp; Expense Monitoring · Hotel &amp; Corporate Office</div>
        </div>
      </div>
      <div class="appbar-actions">
        <div class="period period-select">
          <span class="lbl">Reporting Period</span>
          <input type="month" id="period-input" class="period-month">
        </div>
        <div class="period">
          <span class="lbl">As-of Date</span>
          <span class="val" id="today-val">—</span>
        </div>
        <button class="btn" id="btn-print" title="Print / Save as PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
          Print
        </button>
        <button class="btn btn-ghost" id="btn-reset" title="Reset to seed data">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
          Reset
        </button>
      </div>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </header>

  <main class="wrap">
    <section class="view active" id="view"></section>
  </main>

  <script src="project/data.js"></script>
  <script src="project/app.js"></script>
</body>
</html>
